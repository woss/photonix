services:
  init:
    image: busybox:latest
    volumes:
      - ../data:/data
    command: >
      /bin/sh -c "mkdir -p /data/photos /data/raw-photos-processed /data/cache /data/models &&
                  chown -R 2000:2000 /data/photos /data/raw-photos-processed /data/cache /data/models"

  postgres:
    user: "70:70"
    container_name: photonix-postgres
    image: postgres:18-alpine
    ports:
      # Bound to localhost so the dev database is not exposed on the LAN
      - '127.0.0.1:5432:5432'
    environment:
      POSTGRES_DB: photonix
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql

  redis:
    user: "999:999"
    container_name: photonix-redis
    image: redis:8-alpine
    ports:
      # Bound to localhost so the dev Redis is not exposed on the LAN
      - '127.0.0.1:6379:6379'

  photonix:
    user: "2000:2000"
    container_name: photonix
    # image: photonixapp/photonix:latest
    image: photonix-dev
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    ports:
      - '8888:80'
      - '8889:8000'
      - '6006:6006'
      - '8880:8001'
    environment:
      ENV: dev
      DEMO: 1
      HTTPS: 0
      SAMPLE_DATA: 1
      POSTGRES_HOST: postgres
      POSTGRES_DB: photonix
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      REDIS_HOST: redis
      ALLOWED_HOSTS: '*'
      LOG_LEVEL: DEBUG
      WDS_SOCKET_PORT: 0
    volumes:
      - ../photonix:/srv/photonix
      - ../system:/srv/system
      - ../tests:/srv/tests
      - ../test.py:/srv/test.py
      - ../ui/public:/srv/ui/public
      - ../ui/src:/srv/ui/src
      - ../ui/index.html:/srv/ui/index.html
      - ../ui/vite.config.ts:/srv/ui/vite.config.ts
      - ../ui/tsconfig.json:/srv/ui/tsconfig.json
      - ../ui/tsconfig.app.json:/srv/ui/tsconfig.app.json
      - ../ui/tsconfig.node.json:/srv/ui/tsconfig.node.json
      - ../ui/package.json:/srv/ui/package.json
      - ../ui/package-lock.json:/srv/ui/package-lock.json
      - ../data/photos:/data/photos
      - ../data/raw-photos-processed:/data/raw-photos-processed
      - ../data/cache:/data/cache
      - ../data/models:/data/models
      - ../system/supervisord.conf:/etc/supervisord.conf
    links:
      - postgres
      - redis
    depends_on:
      - init

volumes:
  postgres_data:

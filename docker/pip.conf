[global]
timeout = 60
# Use the canonical PyPI as the primary index so a compromise of the private
# mirror can't shadow a real package with a malicious higher version. The
# mirror remains as an extra index: it still serves the pre-built multiarch
# wheels it caches (pip prefers a same-version wheel over compiling from sdist).
index-url = https://pypi.org/simple
extra-index-url = https://pypi.epixstudios.co.uk/simple

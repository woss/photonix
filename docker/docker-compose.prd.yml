services:
  init:
    image: busybox:latest
    volumes:
      - ../data:/data
    command: >
      /bin/sh -c "mkdir -p /data/photos /data/raw-photos-processed /data/cache /data/models &&
                  chown -R 2000:2000 /data/photos /data/raw-photos-processed /data/cache /data/models"

  postgres:
    user: "70:70"
    container_name: photonix-postgres
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: photonix
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    user: "999:999"
    container_name: photonix-redis
    image: redis:8-alpine
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  photonix:
    user: "2000:2000"
    container_name: photonix
    restart: unless-stopped
    # image: photonixapp/photonix:latest
    image: photonix
    build:
      context: ..
      dockerfile: docker/Dockerfile.prd
    ports:
      - '8888:80'
    environment:
      ENV: prd
      POSTGRES_HOST: postgres
      POSTGRES_DB: photonix
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      REDIS_HOST: redis
      ALLOWED_HOSTS: '*'
    volumes:
      - ../data/photos:/data/photos
      - ../data/raw-photos-processed:/data/raw-photos-processed
      - ../data/cache:/data/cache
      - ../data/models:/data/models
    links:
      - postgres
      - redis
    depends_on:
      - init

volumes:
  postgres_data:

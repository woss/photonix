name: "Docker Build"
 
on:
  push:
    branches:
      - master
    tags:
      - "v*.*.*"
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout repository
        uses: actions/checkout@v6
      -
        name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4
      -
        name: Build test image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/Dockerfile.dev
          load: true
          tags: photonix-test:latest
      -
        name: Start Redis
        run: docker run -d --name redis --network host redis:8-alpine
      -
        name: Run tests
        run: docker run --rm --network host photonix-test:latest python test.py

  test-ui:
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout repository
        uses: actions/checkout@v6
      -
        name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: ui/package-lock.json
      -
        name: Install UI dependencies
        run: npm ci
        working-directory: ui
      -
        name: Lint
        run: npm run lint
        working-directory: ui
      -
        name: Typecheck and build
        run: npm run build
        working-directory: ui

  test-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      -
        name: Checkout repository
        uses: actions/checkout@v6
      -
        name: Start dev stack
        run: docker compose -f docker/docker-compose.dev.yml -f docker/docker-compose.ci.yml up -d --build
      -
        name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: ui/package-lock.json
      -
        name: Install UI dependencies
        run: npm ci
        working-directory: ui
      -
        name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: ui
      -
        name: Wait for the app to come up
        # run.sh runs migrations before starting nginx/vite, so a 200 on /
        # means the stack is fully ready
        run: timeout 300 bash -c 'until curl -sf http://localhost:8888/ > /dev/null; do sleep 5; done'
      -
        name: Run e2e tests
        run: npm run test:e2e
        working-directory: ui
        env:
          CI: 'true'
      -
        name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: ui/playwright-report
          retention-days: 7
      -
        name: Dump container logs on failure
        if: failure()
        run: docker compose -f docker/docker-compose.dev.yml -f docker/docker-compose.ci.yml logs --tail 200 photonix

  build-and-push:
    needs: [test, test-ui, test-e2e]
    # Pull requests only run the test jobs - no DockerHub credentials there
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout repository
        uses: actions/checkout@v6
      -
        name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: photonixapp/photonix
          tags: |
            type=raw,value=edge,enable={{is_default_branch}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
      -
        name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4
      -
        name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      -
        name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/Dockerfile.prd
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=prod
          cache-to: type=gha,mode=max,scope=prod

  deploy-k8s:
    needs: build-and-push
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      -
        name: Set up kubectl
        uses: azure/setup-kubectl@v5
      -
        name: Set up kubeconfig
        uses: azure/k8s-set-context@v5
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG }}
      -
        name: Deploy
        run: |
          echo "Deploying image: photonixapp/photonix:latest"
          kubectl set image deployment/photonix-demo photonix-demo=photonixapp/photonix:latest -n photonix
          kubectl rollout restart deployment/photonix-demo -n photonix
      -
        name: Wait for pod to start
        run: |
          echo "Waiting for photonix-demo deployment to complete..."
          kubectl rollout status deployment/photonix-demo -n photonix --timeout=600s
